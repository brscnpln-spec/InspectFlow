name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Audit · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        env:
          NODE_ENV: development
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: License policy check
        run: npm exec -- license-checker-rseidelsohn --excludePrivatePackages --excludePackages "@replit/vite-plugin-cartographer;@replit/vite-plugin-dev-banner;@replit/vite-plugin-runtime-error-modal" --onlyAllow "MIT;ISC;0BSD;Apache-2.0;BSD-2-Clause;BSD-3-Clause;BlueOak-1.0.0;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;MPL-2.0;(MIT AND CC-BY-3.0);MIT AND ISC"

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  sbom:
    name: SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          artifact-name: sbom-${{ github.sha }}

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Audit · Test · Build

    runs-on: ubuntu-latest
    env:
      NODE_ENV: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Debug install
        run: |
          echo "NODE_ENV=$NODE_ENV"
          ls node_modules/vitest > /dev/null 2>&1 && echo "vitest: YES" || echo "vitest: NO"
          ls node_modules/.bin/license-checker-rseidelsohn > /dev/null 2>&1 && echo "license-checker: YES" || echo "license-checker: NO"

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  sbom:
    name: SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          artifact-name: sbom-${{ github.sha }}

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
